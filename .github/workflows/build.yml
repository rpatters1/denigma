name: Build and Test Denigma

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            generator: Ninja
          - os: macos-latest
            generator: Ninja
          - os: windows-latest
            generator: Ninja

    steps:
      # Checkout the repository with submodules
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true  # Clone submodules recursively
          fetch-depth: 0    # Ensure full history for submodules

      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # Display Preinstalled Tools
      - name: Display preinstalled tools
        run: |
          cmake --version

      # Install Ubuntu build dependencies
      - name: Install build dependencies on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libfontconfig1-dev

      - name: Install Ninja on macOS
        if: matrix.os == 'macos-latest'
        run: brew install ninja || echo "Ninja already installed"

      - name: Install Ninja on Windows
        if: matrix.os == 'windows-latest'
        run: |
          ninja --version && echo "Ninja already installed" || choco install ninja -y

      - name: Verify Ninja Installation
        run: ninja --version || echo "Ninja is not available on this platform"

      - name: Configure with CMake
        run: cmake -G "${{ matrix.generator }}" -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Show bad Ninja line
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $lines = Get-Content build/build.ninja
          $start = [Math]::Max(0, 230 - 5)
          $end = [Math]::Min($lines.Length - 1, 230 + 5)
          for ($i = $start; $i -le $end; $i++) {
            "{0}: {1}" -f ($i + 1), $lines[$i]
          }

      - name: Build
        run: cmake --build build --parallel 2
        
      # Run Tests
      - name: Run Tests
        run: ctest --test-dir build/tests --output-on-failure

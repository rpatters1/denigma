name: Publish Doxygen Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install documentation tools
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz ninja-build libfontconfig1-dev

      - name: Configure with CMake
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=Release -Ddenigma_BUILD_TESTING=OFF

      - name: Build Doxygen site
        run: cmake --build build --target denigma_docs

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/docs/api/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
